<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horaires - GestionRH</title>
  <link rel="stylesheet" href="/styles.css" />
  <script type="module">
    import { ensureLoggedIn, authFetch, clearToken } from './auth.js';
    import { renderTable, showToast } from './ui.js';
    ensureLoggedIn();
    async function load() {
      const res = await authFetch('/api/horaires');
      const data = await res.json();
      renderTable(document.querySelector('#table'),
        [
          { key:'id', label:'ID' },
          { key:'collaborateur', label:'Collaborateur', render:r => r.collaborateur?.email || '' },
          { key:'date', label:'Date' },
          { key:'heureDebut', label:'Début' },
          { key:'heureFin', label:'Fin' }
        ], data);
    }
    async function creer(e){
      e.preventDefault();
      const f = e.target.closest('form');
      const body = Object.fromEntries(new FormData(f).entries());
      const res = await authFetch('/api/horaires', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if(res.ok){ showToast('Horaire créé'); f.reset(); load(); } else showToast('Erreur', false);
    }
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelector('#logout').addEventListener('click', () => { clearToken(); window.location.href = '/index.html'; });
      document.querySelector('#creer').addEventListener('click', creer);
      load();
    });
  </script>
</head>
<body>
<div class="container">
  <h1>Horaires</h1>
  <nav class="cards">
    <a class="card" href="/dashboard.html">Dashboard</a>
    <a class="card" href="/collaborateurs.html">Collaborateurs</a>
    <a class="card" href="/conges.html">Congés</a>
    <a class="card" href="/horaires.html">Horaires</a>
    <button id="logout">Se déconnecter</button>
  </nav>
  <section>
    <h3>Créer un horaire</h3>
    <div class="form-row">
      <input type="number" name="collaborateurId" placeholder="ID Collaborateur" required />
      <input type="date" name="date" required />
      <input type="time" name="heureDebut" required />
      <input type="time" name="heureFin" required />
    </div>
    <button id="creer">Créer</button>
  </section>
  <section>
    <h3>Liste</h3>
    <div id="table"></div>
  </section>
</div>
</body>
</html>
